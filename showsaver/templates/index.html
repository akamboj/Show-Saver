<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Show Saver</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Karla:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>Download<br>Episode</h1>
            <p class="subtitle">Queue episodes for download</p>
        </header>

        <div class="form-container">
            <form id="textForm">
                <div class="form-group">
                    <label for="textInput">Episode URL</label>
                    <textarea
                        id="textInput"
                        name="text"
                        placeholder="https://example.com/cool-epsiode"
                        required
                    ></textarea>
                </div>

                <div class="button-group">
                    <button type="submit" class="submit-btn">
                        <span>Queue Episode</span>
                    </button>
                    <button type="button" class="clear-btn" id="clearBtn">
                        Clear
                    </button>
                </div>
            </form>

            <div id="response" class="response">
                <div class="response-title" id="responseTitle"></div>
                <div class="response-text" id="responseText"></div>
                <div class="stats" id="stats" style="display: none;">
                    <div class="stat">
                        <div class="stat-value" id="statValue1">-</div>
                        <div class="stat-label" id="statLabel1">Status</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="statValue2">-</div>
                        <div class="stat-label" id="statLabel2">Position</div>
                    </div>
                </div>
            </div>

        </div>

        <section class="releases-panel">
            <div class="panel-header">
                <h2>New on Dropout</h2>
                <button id="refreshReleases" class="refresh-btn" title="Refresh">↻</button>
            </div>
            <div id="releasesGrid" class="releases-grid">
                <div class="loading-releases">Loading releases...</div>
            </div>
        </section>
    </div>

    <a href="https://github.com/akamboj/Show-Saver"
       target="_blank"
       rel="noopener noreferrer"
       class="version-link">
        v{{ version }}
    </a>

    <div id="connectionError" class="connection-toast">
        Lost connection to server
    </div>

    <button id="activity-toggle" aria-label="Toggle activity panel">
        <svg id="progress-ring" width="40" height="40" viewBox="0 0 40 40" style="position:absolute;">
            <circle class="progress-ring-bg" cx="20" cy="20" r="17"></circle>
            <circle id="progress-ring-fill" class="progress-ring-fill" cx="20" cy="20" r="17"></circle>
        </svg>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="position:relative;z-index:1;">
            <line x1="8" y1="6" x2="21" y2="6"></line>
            <line x1="8" y1="12" x2="21" y2="12"></line>
            <line x1="8" y1="18" x2="21" y2="18"></line>
            <circle cx="3" cy="6" r="1.5" fill="currentColor" stroke="none"></circle>
            <circle cx="3" cy="12" r="1.5" fill="currentColor" stroke="none"></circle>
            <circle cx="3" cy="18" r="1.5" fill="currentColor" stroke="none"></circle>
        </svg>
        <span id="activity-badge" class="activity-badge hidden"></span>
    </button>

    <div id="activity-overlay"></div>
    <aside id="activity-panel">
        <div class="panel-header activity-panel-header">
            <h2>Download Activity</h2>
            <button id="activity-close" class="refresh-btn" aria-label="Close panel">✕</button>
        </div>
        <div class="panel-clear-row">
            <button id="clearHistoryBtn" class="clear-history-btn" style="display: none;">Clear History</button>
        </div>
        <div id="panelQueueList" class="queue-list"></div>
    </aside>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
