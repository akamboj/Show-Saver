name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  IMAGE_NAME: akamboj2000/show-saver

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - uses: actions/setup-python@v6
      with:
        python-version: '3.14'
        cache: pip
        cache-dependency-path: |
          requirements.txt
          requirements-dev.txt

    - run: pip install -r requirements-dev.txt
    - run: pytest -v

  verify-version:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
    - uses: actions/checkout@v6
    - name: Check tag matches showsaver/version.py
      run: |
        TAG="${GITHUB_REF_NAME#v}"
        FILE_VER=$(python -c "import re,pathlib; print(re.search(r'\"([^\"]+)\"', pathlib.Path('showsaver/version.py').read_text()).group(1))")
        if [ "$TAG" != "$FILE_VER" ]; then
          echo "::error::Tag $GITHUB_REF_NAME (=$TAG) does not match showsaver/version.py (=$FILE_VER)"
          exit 1
        fi
        echo "Tag $GITHUB_REF_NAME matches showsaver/version.py ($FILE_VER)"

  build:
    needs: [tests, verify-version]
    if: |
      always() &&
      needs.tests.result == 'success' &&
      (needs.verify-version.result == 'success' || needs.verify-version.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Login to DockerHub
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Extract image metadata
      id: meta
      uses: docker/metadata-action@v6
      with:
        images: ${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=pr
          type=sha
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-') }}
          type=raw,value=edge,enable={{is_default_branch}}

    - name: Build and push Docker image
      uses: docker/build-push-action@v7
      with:
        push: ${{ github.event_name != 'pull_request' }}
        target: base
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Create GitHub Release
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        PRERELEASE_FLAG=""
        if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
          PRERELEASE_FLAG="--prerelease"
        fi
        gh release create "${GITHUB_REF_NAME}" \
          --title "${GITHUB_REF_NAME}" \
          --generate-notes \
          $PRERELEASE_FLAG
